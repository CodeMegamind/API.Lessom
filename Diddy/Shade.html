<h1>Shades of RGB Colors</h1>

<h1>Shades of the RGB Color Model</h1>

<p><b>Shade</b> is a variation of any color that differs from others in the degree of brightness and intensity.</p>
<ol>
    <li>
    <ul class="Red-class">
        <li class="Dark-red">Dark Red</li>
        <li class="Red">Red</li>
        <li class="Pink">Pink</li>
    </ul>
    </li>

   <li>
    <ul class="Green-class">
    <li class="Dark-green">Dark Green</li>
    <li class="Green">Green</li>
    <li class="Light-green">Light Green</li>
    </ul>
    </li>

    <li>
     <ul class="Blue-class">
    <li class="Dark-blue">Dark Blue</li>
    <li class="Blue">Blue</li>
    <li class="Light-blue">Light Blue</li>
     </ul>
    </li>
    </ol>
