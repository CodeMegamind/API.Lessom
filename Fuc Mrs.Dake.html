<h3>Taras Shevchenko</h3>
<h1>The Cherry Orchard by the House</h1>

<p>
The cherry orchard by the house,<br>
Beetles hum above the cherries,<br>
Ploughmen walk with their ploughs,<br>
Girls sing as they go,<br>
And mothers wait for supper.<br>
The family dines near the house,<br>
The evening star rises.
</p>
